name: Unseen March — Slack Status Notify

on:
  push:
    branches:
      - main
  release:
    types: [published, prereleased]
  workflow_dispatch:
    inputs:
      message:
        description: "Manual status message to post to Slack"
        required: false
        default: "Manual build status check triggered."

jobs:
  notify-slack:
    name: Post Build Status to Slack
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (gives us commit info) ──────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── 2. Build push payload ────────────────────────────────────────────
      - name: Build Slack message (push)
        if: github.event_name == 'push'
        run: |
          echo "SLACK_MSG<<EOF" >> $GITHUB_ENV
          echo "*📦 Unseen March PWA — Push to \`main\`*" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "*Commit:* \`${{ github.sha }}\`" >> $GITHUB_ENV
          echo "*Author:* ${{ github.actor }}" >> $GITHUB_ENV
          echo "*Message:* ${{ github.event.head_commit.message }}" >> $GITHUB_ENV
          echo "*Branch:* ${{ github.ref_name }}" >> $GITHUB_ENV
          echo "*Repo:* <${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>" >> $GITHUB_ENV
          echo "*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Action>" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ── 3. Release payload ───────────────────────────────────────────────
      - name: Build Slack message (release)
        if: github.event_name == 'release'
        run: |
          echo "SLACK_MSG<<EOF" >> $GITHUB_ENV
          echo "*🚀 Unseen March PWA — New Release Published*" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "*Tag:* ${{ github.event.release.tag_name }}" >> $GITHUB_ENV
          echo "*Name:* ${{ github.event.release.name }}" >> $GITHUB_ENV
          echo "*Author:* ${{ github.actor }}" >> $GITHUB_ENV
          echo "*Type:* ${{ github.event.release.prerelease && 'Pre-release' || 'Production Release' }}" >> $GITHUB_ENV
          echo "*Notes:* ${{ github.event.release.body }}" >> $GITHUB_ENV
          echo "*Release URL:* <${{ github.event.release.html_url }}|View Release>" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ── 4. Manual dispatch payload ───────────────────────────────────────
      - name: Build Slack message (manual)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "SLACK_MSG<<EOF" >> $GITHUB_ENV
          echo "*🔧 Unseen March PWA — Manual Status Update*" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "*Triggered by:* ${{ github.actor }}" >> $GITHUB_ENV
          echo "*Message:* ${{ github.event.inputs.message }}" >> $GITHUB_ENV
          echo "*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Action>" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ── 5. Post to Slack ─────────────────────────────────────────────────
      - name: Post to Slack
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "${{ env.SLACK_MSG }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
