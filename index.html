<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    Unseen March — PTSD Recovery Companion

  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />

  <title>Unseen March — PTSD Recovery Companion</title>
  <meta name="description" content="A mental health wellness companion for The Unseen March by Wayne Ince. Grounding tools, mood tracking, crisis resources, and Chapter 5 journaling worksheets for veterans, first responders, and trauma survivors." />
  <meta name="author" content="Wayne A. Ince" />
  <meta name="keywords" content="PTSD, veterans, mental health, grounding, trauma, recovery, military, first responders" />

  <!-- Web App Manifest -->
  <link rel="manifest" href="/unseen-march-pwa/manifest.json" />

  <!-- Theme / PWA meta -->
  <meta name="theme-color" content="#3d5c2c" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1a2430" media="(prefers-color-scheme: dark)" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Unseen March" />

  <!-- Icons -->
  <link rel="apple-touch-icon" href="/unseen-march-pwa/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/unseen-march-pwa/icons/icon-152.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/unseen-march-pwa/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/unseen-march-pwa/icons/icon-96.png" />
  <link rel="shortcut icon" href="/unseen-march-pwa/icons/icon-96.png" />

  <!-- MS meta -->
  <meta name="msapplication-TileImage" content="/unseen-march-pwa/icons/icon-144.png" />
  <meta name="msapplication-TileColor" content="#3d5c2c" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Unseen March — PTSD Recovery Companion" />
  <meta property="og:description" content="Your daily wellness companion for PTSD recovery. Grounding tools, mood tracking, crisis resources, and journaling worksheets for veterans and first responders." />
  <meta property="og:image" content="/unseen-march-pwa/icons/icon-512.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=zodiak@400,500,700&f[]=general-sans@400,500,600&display=swap" rel="stylesheet" />

  <!-- App stylesheet -->
  <link rel="stylesheet" crossorigin href="/unseen-march-pwa/assets/app.css" />

  <style>
    /* Ensure the app fills the screen on mobile */
    html, body, #root {
      width: 100%;
      min-height: 100dvh;
      margin: 0;
      padding: 0;
      background: hsl(45, 15%, 96%);
    }
    @media (prefers-color-scheme: dark) {
      html, body, #root { background: hsl(200, 18%, 8%); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Full app bundle — runs standalone, no iframe needed -->
  <!-- crossorigin required for Safari ES module CORS handling -->
  <script type="module" crossorigin src="/unseen-march-pwa/assets/app.js"></script>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/unseen-march-pwa/sw.js', {
          scope: '/unseen-march-pwa/'
        }).then(reg => {
          console.log('[SW] Registered:', reg.scope);
          // Register background sync tags when online
          if ('SyncManager' in window) {
            navigator.serviceWorker.ready.then(sw => {
              // These will fire when connectivity is restored
              sw.sync.register('sync-mood-checkin').catch(() => {});
              sw.sync.register('sync-journal-entry').catch(() => {});
            });
          }
        }).catch(err => console.warn('[SW] Registration failed:', err));
      });
    }

    // Handle install prompt — native Android install button
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
    });

    // Handle shortcut query params — route to correct screen on launch
    const params = new URLSearchParams(location.search);
    const screen = params.get('screen');
    if (screen) {
      // Wait for React to mount, then navigate via hash
      window.addEventListener('load', () => {
        setTimeout(() => {
          window.location.hash = '#/' + screen;
        }, 100);
      });
    }
  </script>
</body>
</html>
