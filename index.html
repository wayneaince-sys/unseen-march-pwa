<style>
  .status-bar { display: none !important; }
  a[href="https://www.perplexity.ai/computer"] { display: none !important; }

  #splash {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    background: #131c26;
    z-index: 9999;
    opacity: 1;
    transition: opacity 0.4s ease;
    -webkit-transition: opacity 0.4s ease;
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
    will-change: opacity;
  }
  #splash.hidden { opacity: 0; pointer-events: none; }
  #splash-logo {
    width: 72px; height: 72px; border-radius: 18px;
    background: #1a2f1a; border: 2px solid #3d5c2c;
    display: flex; align-items: center; justify-content: center;
  }
  #splash-title { font-family: Georgia, serif; font-size: 1.4rem; color: #c9a84c; letter-spacing: 0.05em; }
  #splash-sub { font-family: Georgia, serif; font-size: 0.8rem; color: #607060; letter-spacing: 0.08em; text-transform: uppercase; }
  .spinner {
    width: 26px; height: 26px;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: #3d5c2c; border-radius: 50%;
    animation: spin 0.75s linear infinite;
    -webkit-animation: spin 0.75s linear infinite;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
  }
  @-webkit-keyframes spin { to { -webkit-transform: rotate(360deg); transform: rotate(360deg); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  #app-footer {
    position: fixed;
    bottom: 70px;
    left: 0; right: 0;
    text-align: center;
    pointer-events: none;
    z-index: 100;
  }
  #app-footer a {
    pointer-events: all;
    font-size: 0.7rem; color: #607060;
    text-decoration: none; letter-spacing: 0.04em;
    font-family: Georgia, serif;
    background: rgba(19,28,38,0.85);
    padding: 3px 10px; border-radius: 20px;
  }
  #app-footer a:hover { color: #c9a84c; }

<body>

  <div id="splash">
    <div id="splash-logo">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/>
      </svg>
    </div>
    <div id="splash-title">Unseen March</div>
    <div id="splash-sub">PTSD Recovery Companion</div>

  </div>

  <div id="root"></div>

  <div id="app-footer">
    <a href="/unseen-march-pwa/privacy-policy.html">Privacy Policy</a>
  </div>

  <script>
    (function() {
      var MIN_DISPLAY = 1200;

      function showSplash() {
        var existing = document.getElementById('splash');
        if (existing) existing.remove();
        var splash = document.createElement('div');
        splash.id = 'splash';
        splash.innerHTML = '<div id="splash-logo"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg></div><div id="splash-title">Unseen March</div><div id="splash-sub">PTSD Recovery Companion</div><div class="spinner"></div>';
        document.body.insertBefore(splash, document.body.firstChild);
        setTimeout(function() {
          splash.classList.add('hidden');
          setTimeout(function() {
            if (splash.parentNode) splash.parentNode.removeChild(splash);
          }, 500);
        }, MIN_DISPLAY);
      }

      var startTime = Date.now();
      var dismissed = false;

      function hideSplash() {
        if (dismissed) return;
        var elapsed = Date.now() - startTime;
        var remaining = Math.max(0, MIN_DISPLAY - elapsed);
        setTimeout(function() {
          if (dismissed) return;
          dismissed = true;
          var splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(function() {
              if (splash.parentNode) splash.parentNode.removeChild(splash);
            }, 500);
          }
        }, remaining);
      }

      document.addEventListener('DOMContentLoaded', hideSplash);
      window.addEventListener('load', hideSplash);
      setTimeout(hideSplash, 4000);

      window.addEventListener('pageshow', function(e) {
        if (e.persisted) {
          dismissed = false;
          showSplash();
        }
      });
    })();
  </script>

  <script type="module" src="/unseen-march-pwa/assets/app.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async function() {
        try {
          var reg = await navigator.serviceWorker.register(
            '/unseen-march-pwa/sw.js',
            { scope: '/unseen-march-pwa/' }
          );
          if ('sync' in reg) {
            await reg.sync.register('unseen-march-bg-sync');
          }
        } catch (err) {
          console.error('[SW] Registration failed:', err);
        }
      });
    }
  </script>
<!-- ============================================================
     UNSEEN MARCH — JOURNAL LOCAL STORAGE PATCH
     
     PURPOSE: Intercepts the broken /api/journal network calls
     and saves journal entries to the browser's localStorage
     instead. Entries stay on the user's device, never leave.
     
     HOW TO INSTALL:
     1. Open your repo on GitHub: wayneaince-sys/unseen-march-pwa
     2. Click on index.html
     3. Click the pencil icon to edit
     4. Find the closing </body> tag near the bottom of the file
     5. Paste EVERYTHING FROM THIS COMMENT'S END through the
        closing </script> tag IMMEDIATELY BEFORE </body>
     6. Scroll down, write a commit message ("Add journal save patch")
     7. Click "Commit changes"
     8. Wait 60-90 seconds for GitHub Pages to rebuild
     9. Hard-refresh the app (Ctrl+Shift+R) and test save
     ============================================================ -->

<script>
(function () {
  'use strict';

  var STORAGE_KEY = 'unseen_march_journal_entries';
  // Matches /api/journal, /api/journal/, /api/journal/anything
  var API_MATCH = /\/api\/journal(\/|$|\?)/i;

  function getEntries() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      console.warn('[Unseen March] Could not read stored entries:', e);
      return [];
    }
  }

  function saveEntries(entries) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      return true;
    } catch (e) {
      console.error('[Unseen March] localStorage write failed:', e);
      return false;
    }
  }

  function makeResponse(payload, status) {
    return new Response(JSON.stringify(payload), {
      status: status || 200,
      headers: { 'Content-Type': 'application/json' }
    });
  }

  function generateId() {
    return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
  }

  // Monkey-patch fetch
  var originalFetch = window.fetch.bind(window);

  window.fetch = function (input, init) {
    var url = (typeof input === 'string') ? input : (input && input.url) || '';

    if (API_MATCH.test(url)) {
      var method = ((init && init.method) || (input && input.method) || 'GET').toUpperCase();

      // SAVE (POST / PUT)
      if (method === 'POST' || method === 'PUT') {
        var entryData = {};
        try {
          var body = init && init.body;
          if (typeof body === 'string' && body.length) {
            entryData = JSON.parse(body);
          } else if (body instanceof FormData) {
            body.forEach(function (value, key) { entryData[key] = value; });
          } else if (body && typeof body === 'object') {
            entryData = body;
          }
        } catch (parseErr) {
          entryData = { rawBody: String((init && init.body) || '') };
        }

        var entry = Object.assign(
          { id: generateId(), createdAt: new Date().toISOString() },
          entryData
        );

        var entries = getEntries();
        entries.push(entry);
        var ok = saveEntries(entries);

        console.log('[Unseen March] Journal entry saved locally:', entry);
        return Promise.resolve(
          ok
            ? makeResponse({ success: true, entry: entry, id: entry.id }, 200)
            : makeResponse({ success: false, error: 'storage_unavailable' }, 507)
        );
      }

      // LIST (GET)
      if (method === 'GET') {
        return Promise.resolve(makeResponse(getEntries(), 200));
      }

      // DELETE
      if (method === 'DELETE') {
        var remaining = getEntries();
        // Try to extract an id from the URL tail
        var match = url.match(/\/api\/journal\/([^\/\?]+)/i);
        if (match && match[1]) {
          remaining = remaining.filter(function (e) { return String(e.id) !== match[1]; });
          saveEntries(remaining);
        }
        return Promise.resolve(makeResponse({ success: true }, 200));
      }

      // Anything else — acknowledge
      return Promise.resolve(makeResponse({ success: true }, 200));
    }

    // Not our endpoint — pass through untouched
    return originalFetch.apply(this, arguments);
  };

  // Expose a helper for debugging — run in DevTools console to view all entries:
  //     unseenMarchDebug.listEntries()
  window.unseenMarchDebug = {
    listEntries: function () { console.table(getEntries()); return getEntries(); },
    clearEntries: function () { localStorage.removeItem(STORAGE_KEY); console.log('Cleared.'); },
    entryCount: function () { return getEntries().length; }
  };

  console.log('[Unseen March] Journal local-storage patch active. Entries save to this device only.');
})();
</script>
