<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Unseen March — PTSD Recovery Companion</title>
  <meta name="description" content="A mental health wellness companion for The Unseen March by Wayne Ince. Grounding tools, mood tracking, crisis resources, and journaling worksheets for veterans, first responders, and trauma survivors." />

  <!-- Web App Manifest — same origin, same scope -->
  <link rel="manifest" href="/unseen-march-pwa/manifest.json" />

  <!-- PWA / Theme meta -->
  <meta name="theme-color" content="#3d5c2c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Unseen March" />

  <!-- Icons -->
  <link rel="apple-touch-icon" href="/unseen-march-pwa/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/unseen-march-pwa/icons/icon-152.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/unseen-march-pwa/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/unseen-march-pwa/icons/icon-96.png" />
  <link rel="shortcut icon" href="/unseen-march-pwa/icons/icon-96.png" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #1a2430;
      font-family: -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Full-screen iframe — the real app lives here */
    #app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Splash shown while iframe loads */
    #splash {
      position: fixed;
      inset: 0;
      background: #1a2430;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    #splash.hidden { opacity: 0; pointer-events: none; }

    #splash img {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    #splash h1 {
      color: #e8e4da;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    #splash p {
      color: #6a8060;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #3d5c2c;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- Splash screen shown while app loads -->
  <div id="splash">
    <img src="/unseen-march-pwa/icons/icon-192.png" alt="Unseen March" />
    <h1>Unseen March</h1>
    <p>PTSD Recovery Companion</p>
    <div class="spinner"></div>
  </div>

  <!-- The full companion app loads here -->
  <iframe
    id="app-frame"
    src="https://www.perplexity.ai/computer/a/unseen-march-ptsd-recovery-com-SMkYney4QvqDb7UBtnLmbw"
    title="Unseen March PTSD Recovery Companion"
    allow="notifications"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation"
  ></iframe>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/unseen-march-pwa/sw.js', {
        scope: '/unseen-march-pwa/'
      }).catch(console.warn);
    }

    // Hide splash once iframe loads
    const frame = document.getElementById('app-frame');
    const splash = document.getElementById('splash');
    frame.addEventListener('load', () => {
      setTimeout(() => splash.classList.add('hidden'), 300);
    });

    // Handle shortcut query params — deep link into the right screen
    const params = new URLSearchParams(location.search);
    const screen = params.get('screen');
    if (screen) {
      frame.addEventListener('load', () => {
        frame.contentWindow?.postMessage({ screen }, '*');
      }, { once: true });
    }
  </script>
</body>
</html>
